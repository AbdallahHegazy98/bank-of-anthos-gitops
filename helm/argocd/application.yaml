apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: bank-of-anthos
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/AbdallahHegazy98/bank-of-anthos-gitops.git
    targetRevision: main
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true