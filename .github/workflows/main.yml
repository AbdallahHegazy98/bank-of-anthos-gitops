name: Bank of Anthos CI/CD

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: abdallahhegazy/bank-of-anthos-frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        working-directory: src/frontend
        run: |
          uv sync

      - name: Validate Python files
        working-directory: src/frontend
        run: |
          python -m compileall .

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract short SHA
        id: vars
        run: echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        working-directory: src/frontend
        run: |
          docker build \
            -t $IMAGE_NAME:latest \
            -t $IMAGE_NAME:${{ steps.vars.outputs.sha_short }} \
            .

      - name: Push Docker images
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ steps.vars.outputs.sha_short }}

      - name: Update Kubernetes Manifest
        run: |
          sed -i "s|image:.*|image: $IMAGE_NAME:${{ steps.vars.outputs.sha_short }}|g" kubernetes-manifests/frontend.yaml

      - name: Commit manifest changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add kubernetes-manifests/frontend.yaml

          if git diff --cached --quiet; then
            echo "No manifest changes."
            exit 0
          fi

          git commit -m "Deploy frontend ${{ steps.vars.outputs.sha_short }}"

      - name: Push changes
        run: |
          git push